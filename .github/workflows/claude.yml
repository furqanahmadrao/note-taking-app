name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Claude Code Router
        run: |
          # Install bun package manager
          curl -fsSL https://bun.sh/install | bash
          
          # Create router config directory
          mkdir -p $HOME/.claude-code-router
          
          # Create config file with actual API key value
          cat > $HOME/.claude-code-router/config.json << EOF
          {
            "LOG": true,
            "LOG_LEVEL": "info",
            "NON_INTERACTIVE_MODE": true,
            "API_TIMEOUT_MS": 600000,
            "Providers": [
              {
                "name": "openrouter",
                "api_base_url": "https://openrouter.ai/api/v1/chat/completions",
                "api_key": "${OPENROUTER_API_KEY}",
                "models": [
                  "moonshotai/kimi-k2:free"
                ],
                "transformer": {
                  "use": ["openrouter"]
                }
              }
            ],
            "Router": {
              "default": "openrouter,moonshotai/kimi-k2:free"
            }
          }
          EOF
          
          echo "✅ Router configured"
          echo "📝 Config preview (API key redacted):"
          cat $HOME/.claude-code-router/config.json | sed 's/"api_key": ".*"/"api_key": "<REDACTED>"/'
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Start Claude Code Router Service
        run: |
          # Start the router in background
          nohup ~/.bun/bin/bunx @musistudio/claude-code-router@1.0.40 start > /tmp/router.log 2>&1 &
          
          # Wait for service initialization
          echo "⏳ Waiting for router to start..."
          for i in {1..10}; do
            if curl -f http://localhost:3456/health 2>/dev/null; then
              echo "✅ Router service is healthy (attempt $i)"
              exit 0
            fi
            echo "⏳ Waiting... (attempt $i/10)"
            sleep 2
          done
          
          echo "⚠️ Router may not be fully ready, checking logs:"
          tail -n 20 /tmp/router.log 2>/dev/null || echo "No logs available"
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          anthropic_api_key: "router-managed"

      - name: Debug on Failure
        if: failure()
        run: |
          echo "=== Router Logs ==="
          tail -n 100 /tmp/router.log 2>/dev/null || echo "No router logs found"
          
          echo ""
          echo "=== Router Directory Logs ==="
          tail -n 50 $HOME/.claude-code-router/logs/ccr-*.log 2>/dev/null || echo "No directory logs found"
          
          echo ""
          echo "=== Claude Code Router Logs ==="
          tail -n 50 $HOME/.claude-code-router/claude-code-router.log 2>/dev/null || echo "No application logs found"
          
          echo ""
          echo "=== Process Check ==="
          ps aux | grep -E "claude-code-router|bunx" || echo "No router processes found"
          
          echo ""
          echo "=== Network Check ==="
          netstat -tlnp 2>/dev/null | grep 3456 || echo "Port 3456 not listening"
